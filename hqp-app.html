<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HIGH QUALITY POSTING アプリ</title>

<style>
:root{
  --bg:#070b12;
  --card:#0f1622;
  --accent:#00ffd5;
  --text:#eaf2ff;
}

body{
  margin:0;
  background:linear-gradient(180deg,#070b12,#0b1320);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}

/* ===== HERO ===== */
.hero{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:60px 8%;
  gap:40px;
}

.hero-left{
  max-width:640px;
}

.hero h1{
  font-size:48px;
  line-height:1.3;
  margin-bottom:20px;
}

.hero p{
  opacity:.7;
  line-height:1.8;
}

/* ===== 右側画像 ===== */
.hero-screen-card{
  max-width:420px;
  margin-inline:auto;
  padding:18px;
  border-radius:34px;
  background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
  border:1px solid rgba(255,255,255,.12);
  box-shadow:0 20px 60px rgba(0,0,0,.6);
}

.hero-screen-card img{
  width:100%;
  aspect-ratio:9 / 16;
  object-fit:cover;
  object-position:top center;
  border-radius:26px;
  border:1px solid rgba(255,255,255,.12);
  background:#05070b;
}

/* ===== セクション ===== */
.section{
  padding:80px 8%;
}

.section h2{
  font-size:32px;
  margin-bottom:30px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
}

.card{
  background:var(--card);
  padding:20px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,.08);
}

/* ===== 画像一覧 ===== */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

.gallery img{
  width:100%;
  border-radius:12px;
}

/* ===== レスポンシブ ===== */
@media(max-width:900px){
  .hero{
    flex-direction:column;
    text-align:center;
  }
}
</style>
</head>

<body>

<!-- ===== HERO ===== -->
<section class="hero">

  <div class="hero-left">
    <h1>
      配布ルート・投函記録・日報共有を<br>
      アプリで一元管理。
    </h1>

    <p>
      HIGH QUALITY POSTINGアプリは、ポスティング業務に必要な<br>
      マッピング、投函入力、日報、共有機能をすべてまとめた専用ツールです。
    </p>
  </div>

  <!-- ★ここが変更部分 -->
  <div class="hero-screen-card">
    <img src="app-screen-home.png" alt="アプリホーム画面">
  </div>

</section>

<!-- ===== 機能一覧 ===== -->
<section class="section">
  <h2>アプリの全機能</h2>

  <div class="grid">

    <div class="card">全体マッピング（建物管理・ピン管理）</div>
    <div class="card">投函入力（建物単位で記録）</div>
    <div class="card">お気に入りルート作成</div>
    <div class="card">ルート共有（スタッフ・クライアント）</div>
    <div class="card">投函日報（PDF / Excel 出力）</div>
    <div class="card">日報共有（アプリ未導入者OK）</div>
    <div class="card">投函タイムライン共有</div>
    <div class="card">スタッフ管理（招待コード）</div>
    <div class="card">ピン作成・編集・削除・移動</div>

  </div>
</section>

<!-- ===== 画面イメージ ===== -->
<section class="section">
  <h2>画面イメージ</h2>

  <div class="gallery">

    <img src="app-screen-home.png">
    <img src="map-overview.jpg">
    <img src="posting-input.jpg">
    <img src="timeline.jpg">
    <img src="daily-report.jpg">
    <img src="favorite-route.jpg">

  </div>
</section>

</body>
</html>
