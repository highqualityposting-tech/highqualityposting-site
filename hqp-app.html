<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HIGH QUALITY POSTING アプリ</title>

<style>
:root{
  --bg:#070b12;
  --card:#0f1622;
  --accent:#00ffd5;
  --text:#eaf2ff;
}

body{
  margin:0;
  background:linear-gradient(180deg,#070b12,#0b1320);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}

/* ===== HEADER ===== */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 8%;
}

.header a{
  color:white;
  text-decoration:none;
  margin-left:20px;
  opacity:.7;
}

/* ===== HERO ===== */
.hero{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:60px 8%;
  gap:60px;
}

.hero-left{
  max-width:600px;
}

.hero h1{
  font-size:48px;
  line-height:1.3;
  margin-bottom:20px;
}

.hero p{
  opacity:.7;
  line-height:1.8;
}

/* ===== ここが今回の変更部分 ===== */
.hero-screen{
  width:420px;
  border-radius:30px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.1);
  box-shadow:0 20px 60px rgba(0,0,0,.6);
}

.hero-screen img{
  width:100%;
  display:block;
}

/* ===== セクション ===== */
.section{
  padding:80px 8%;
}

.section h2{
  font-size:32px;
  margin-bottom:30px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
}

.card{
  background:var(--card);
  padding:20px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,.08);
}

/* ===== ギャラリー ===== */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

.gallery img{
  width:100%;
  border-radius:12px;
}

/* ===== レスポンシブ ===== */
@media(max-width:900px){
  .hero{
    flex-direction:column;
    text-align:center;
  }

  .hero-screen{
    width:100%;
    max-width:400px;
  }
}
</style>
</head>

<body>

<!-- ===== HEADER ===== -->
<div class="header">
  <div><strong>HIGH QUALITY POSTING</strong></div>
  <div>
    <a href="#">概要</a>
    <a href="#">画面</a>
    <a href="#">機能</a>
  </div>
</div>

<!-- ===== HERO ===== -->
<section class="hero">

  <div class="hero-left">
    <h1>
      配布ルート・投函記録・日報共有を<br>
      アプリで一元管理。
    </h1>

    <p>
      ポスティング業務に必要なすべての機能を統合。<br>
      管理・記録・共有を一つのアプリで完結。
    </p>
  </div>

  <!-- ★ここだけ差し替え -->
  <div class="hero-screen">
    <img src="app-screen-home.png" alt="ホーム画面">
  </div>

</section>

<!-- ===== 機能 ===== -->
<section class="section">
  <h2>アプリの全機能</h2>

  <div class="grid">

    <div class="card">全体マップ管理（ピン作成・編集・削除・移動）</div>
    <div class="card">投函入力（建物ごと記録）</div>
    <div class="card">お気に入りルート作成</div>
    <div class="card">ルート共有（スタッフ・クライアント）</div>

    <div class="card">投函日報 PDF / Excel 出力</div>
    <div class="card">日報共有（未導入者OK）</div>
    <div class="card">投函タイムライン共有</div>

    <div class="card">スタッフ招待（5 / 20 / 100人）</div>

  </div>
</section>

<!-- ===== 画面イメージ ===== -->
<section class="section">
  <h2>画面イメージ</h2>

  <div class="gallery">

    <img src="app-screen-home.png">
    <img src="map-overview.jpg">
    <img src="posting-input.jpg">
    <img src="timeline.jpg">
    <img src="daily-report.jpg">
    <img src="favorite-route.jpg">

  </div>
</section>

</body>
</html>
